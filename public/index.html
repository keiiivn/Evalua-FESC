<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa FESC - UNAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">Evalúa<span>FESC</span></div>
        </div>
    </header>

    <section class="hero">
        <h1>Califica a tu Profesor</h1>
        <p>Comunidad Universitaria FESC</p>
    </section>

    <div class="container">
        <section class="form-card">
            <h2><i class="fas fa-edit"></i> Nueva Evaluación</h2>
            <form id="ratingForm">
                <div class="grid-inputs">
                    <input type="text" id="profName" placeholder="Nombre del Profesor" required>
                    <input type="text" id="subject" placeholder="Materia" required>
                    <input type="number" id="score" placeholder="Nota (0-10)" min="0" max="10" step="0.1" required>
                </div>
                <textarea id="comment" placeholder="Escribe tu reseña aquí..."></textarea>
                <button type="submit" class="btn-submit">Enviar Calificación</button>
            </form>
        </section>

        <section class="professors-grid" id="prof-list">
            </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
